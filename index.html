
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Expert Mock Interview Bot</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
        .chat-container { max-width: 500px; margin: 40px auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 24px; }
        .chat-box { height: 350px; overflow-y: auto; border: 1px solid #eee; border-radius: 6px; padding: 12px; margin-bottom: 16px; background: #fafafa; }
        .msg { margin: 8px 0; }
        .msg.user { text-align: right; color: #4f46e5; }
        .msg.bot { text-align: left; color: #111; }
        .input-row { display: flex; gap: 8px; }
        input[type="text"] { flex: 1; padding: 10px; border-radius: 4px; border: 1px solid #ccc; font-size: 1rem; }
        button { padding: 10px 18px; border-radius: 4px; border: none; background: #4f46e5; color: #fff; font-size: 1rem; cursor: pointer; }
        button:disabled { background: #bbb; }
        h2 { text-align: center; color: #4f46e5; }
    </style>
</head>
<body>
    <div class="chat-container">
        <h2>Career Expert Mock Interview</h2>
        <div class="chat-box" id="chat-box"></div>
        <div class="input-row">
            <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off" />
            <button id="send-btn">Send</button>
        </div>
    </div>
    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        function addMsg(text, sender) {
            const div = document.createElement('div');
            div.className = 'msg ' + sender;
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            addMsg(text, 'user');
            userInput.value = '';
            sendBtn.disabled = true;
            addMsg('...', 'bot');
            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();
                // Remove the '...' loading message
                chatBox.removeChild(chatBox.lastChild);
                if (data.response) {
                    addMsg(data.response, 'bot');
                } else {
                    addMsg('Error: ' + (data.error || 'Unknown error'), 'bot');
                }
            } catch (e) {
                chatBox.removeChild(chatBox.lastChild);
                addMsg('Error connecting to server.', 'bot');
            }
            sendBtn.disabled = false;
            userInput.focus();
        }

        sendBtn.onclick = sendMessage;
        userInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };

        // Initial greeting
        addMsg('Hello! I am your career expert. I will conduct a mock interview. Please tell me your target role and a brief summary of your experience.', 'bot');
    </script>
</body>
</html>
